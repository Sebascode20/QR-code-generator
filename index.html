<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Generate and download QR codes quickly and for free. Create custom QR codes for URLs. Share your codes instantly from any device."
    />
    <meta
      name="keywords"
      content="QR code generator, create QR code, free QR code, generate QR code online, download QR code, custom QR code, QR code for URL, QR code reader, QR code generator, share QR code"
    />

    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />

    <title>QR code generator</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/fonts.css" />
  </head>
  <body>
    <main>
      <!-- URL SECTION -->
      <section class="url-section">
        <picture>
          <source media="(min-width: 768px)" srcset="./resources/Logo.svg" />
          <source srcset="./resources/Logo-small.svg" type="image/svg+xml" />
          <img
            src="./resources/Logo-small.svg"
            width="114"
            height="24"
            alt="logo"
          />
        </picture>
        <form class="form-qr">
          <input
            type="url"
            name="url"
            id="url"
            placeholder="Enter an url"
            title="It must include http:// or https:// followed by the address"
            required
          />
          <button type="submit">QR code</button>
        </form>
      </section>
      <!-- CODE QR SECTION -->
      <section class="hidden-section qr-section">
        <picture>
          <source media="(min-width: 768px)" srcset="./resources/Logo.svg" />
          <source srcset="./resources/Logo-small.svg" type="image/svg+xml" />
          <img
            src="./resources/Logo-small.svg"
            width="114"
            height="24"
            alt="logo"
          />
        </picture>
        <div id="qrcode"></div>
        <div class="links">
          <div class="btn download">
            <a id="link-download" href="#" download>Download</a>
            <img
              src="./resources/Load_circle_duotone.svg"
              width="24"
              height="24"
              alt="download"
            />
          </div>
          <div class="btn share">
            <a id="link-share" href="#">Share</a>
            <img
              src="./resources/link_alt.svg"
              width="24"
              height="24"
              alt="share"
            />
          </div>
        </div>
      </section>
    </main>
    <footer class="author-info">
      Coded by
      <a
        href="https://www.linkedin.com/in/sebastián-emilio-aguiñada-coto-497a3527b"
        target="_blank"
        >Sebastián Aguiñada</a
      >
      | Challenge by
      <a href="https://www.devchallenges.io?ref=challenge" target="_blank"
        >devChallenges.io</a
      >.
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="./js/index.js"></script>
  </body>
</html>
