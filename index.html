<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />

    <title>QR code generator | devChallenges.io</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/fonts.css" />
  </head>
  <body>
    <main>
      <picture>
        <source media="(min-width: 768px)" srcset="./resources/Logo.svg" />
        <source srcset="./resources/Logo-small.svg" type="image/svg+xml" />
        <img
          src="./resources/Logo-small.svg"
          width="114"
          height="24"
          alt="logo"
        />
      </picture>
      <div class="input-btn">
        <input type="text" name="url" id="url" placeholder="Enter an url" required />
        <button type="submit">QR code</button>
      </div>
    </main>
    <!--

        href="https://www.linkedin.com/in/sebastián-emilio-aguiñada-coto-497a3527b"
        >Sebastián Aguiñada</a
      >
      | Challenge by
      <a href="https://www.devchallenges.io?ref=challenge" target="_blank"
        >devChallenges.io</a
      >.
    </footer>
  </body>
</html>
